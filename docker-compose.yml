services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    image: tipcalc-web:latest
    container_name: tipcalc-web
    restart: unless-stopped
    ports:
      - "8080:80"

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    image: tipcalc-bot:latest
    container_name: tipcalc-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
